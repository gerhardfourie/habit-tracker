<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HABIT // TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060c;--card:#10101e;--border:#1a1a30;--cyan:#00e5ff;--green:#00ff6a;--red:#ff003c;--text:#d4d4e0;--dim:#4a4a6a}
html,body{height:100%}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background-color 2s ease}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
#ambientGlow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;transition:background 2s ease}
.container{max-width:1100px;margin:0 auto;padding:24px 20px;position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
.header{text-align:center;margin-bottom:16px;flex-shrink:0}
.header h1{font-family:'Orbitron',sans-serif;font-size:2.4rem;font-weight:900;letter-spacing:0.25em;color:var(--cyan);text-shadow:0 0 20px rgba(0,229,255,0.4),0 0 60px rgba(0,229,255,0.15)}
.header .tagline{font-size:0.7rem;color:var(--dim);letter-spacing:0.6em;text-transform:uppercase;margin-top:4px}
.stats-bar{display:flex;justify-content:center;gap:48px;margin-top:14px;padding:12px 24px;border:1px solid var(--border);border-radius:10px;background:linear-gradient(135deg,rgba(0,229,255,0.02),rgba(168,85,247,0.02))}
.stat{text-align:center}
.stat .val{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:var(--green);text-shadow:0 0 15px rgba(0,255,106,0.4)}
.stat .lbl{font-size:0.55rem;color:var(--dim);letter-spacing:0.35em;text-transform:uppercase;margin-top:2px}
.habit-name-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;flex-shrink:0}
.habit-name-bar input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.1em;text-align:center;padding:6px 16px;outline:none;transition:border-color .3s;width:300px}
.habit-name-bar input:focus{border-color:var(--cyan)}
.grid-wrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.grid-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3}
.grid-head{display:grid;grid-template-columns:56px repeat(7,1fr);gap:5px;margin-bottom:5px;flex-shrink:0}
.grid-head span{text-align:center;font-size:0.6rem;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;padding:4px 0}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,0.2) transparent}
.scroll-area::-webkit-scrollbar{width:6px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.2);border-radius:3px}
.scroll-area::-webkit-scrollbar-thumb:hover{background:rgba(0,229,255,0.4)}
.week-row{display:grid;grid-template-columns:56px repeat(7,1fr);gap:5px;margin-bottom:5px}
.wk-label{font-size:0.55rem;color:var(--dim);display:flex;align-items:center;justify-content:center;white-space:nowrap}
.cell{height:48px;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;user-select:none;position:relative}
.cell:hover:not(.future){border-color:rgba(0,229,255,0.5);transform:scale(1.04);z-index:2}
.cell.checked{color:var(--green);border-color:rgba(0,255,106,0.35);text-shadow:0 0 12px rgba(0,255,106,0.6)}
.cell.checked .mark{font-weight:bold}
.cell.missed{border-color:rgba(255,0,60,0.5);color:var(--red);text-shadow:0 0 12px rgba(255,0,60,0.6);background:rgba(255,0,60,0.06)}
.cell.future{opacity:0.15;cursor:default;pointer-events:none}
.cell.today{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,229,255,0.25)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.cell.pop{animation:pop .25s ease}
.cell .mark{position:relative;z-index:1;font-size:1.5rem}
@media(max-width:700px){
  .header h1{font-size:1.5rem;letter-spacing:0.12em}
  .stats-bar{gap:20px;padding:10px 14px}
  .stat .val{font-size:1.2rem}
  .grid-head,.week-row{grid-template-columns:40px repeat(7,1fr);gap:3px}
  .grid-wrap{padding:10px 10px}
  .container{padding:12px 8px}
  .cell .mark{font-size:1.1rem}
  .cell{border-radius:7px;height:38px}
}
</style>
</head>
<body>
<div id="ambientGlow"></div>
<div class="container">
  <div class="header">
    <h1>HABIT TRACKER</h1>
    <div class="tagline">discipline equals freedom</div>
    <div class="stats-bar">
      <div class="stat"><div class="val" id="sBest">0</div><div class="lbl">Best Streak</div></div>
      <div class="stat"><div class="val" id="sTotal">0</div><div class="lbl">Total Checks</div></div>
      <div class="stat"><div class="val" id="sStreak">0</div><div class="lbl">Current Streak</div></div>
    </div>
  </div>
  <div class="habit-name-bar">
    <input type="text" id="habitName" value="Exercise" spellcheck="false"/>
  </div>
  <div class="grid-wrap" id="gridWrap">
    <div class="grid-head" id="gridHead"></div>
    <div class="scroll-area" id="scrollArea"></div>
  </div>
</div>
<script>
const WEEKS=26,SK='htracker_v4';
const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
let state=load();

function load(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}return{name:'Exercise',data:{}};}
function save(){localStorage.setItem(SK,JSON.stringify(state))}

document.getElementById('habitName').value=state.name||'Exercise';
document.getElementById('habitName').addEventListener('input',function(){state.name=this.value;save();});

function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt;}
function fmtDate(d){return d.toISOString().slice(0,10)}
function fmtWeek(d){const m=d.getMonth()+1,day=d.getDate();return (day<10?'0':'')+day+'/'+(m<10?'0':'')+m;}

function getWeeks(){const today=new Date();const mon=getMonday(today);const weeks=[];for(let i=WEEKS-1;i>=0;i--){const wk=new Date(mon);wk.setDate(wk.getDate()-i*7);const days=[];for(let j=0;j<7;j++){const d=new Date(wk);d.setDate(d.getDate()+j);days.push(d);}weeks.push({start:wk,days});}return weeks;}

function calcStreak(){
  const d=state.data;let streak=0,dt=new Date();dt.setHours(0,0,0,0);
  while(true){
    const key=fmtDate(dt);
    if(d[key]==='checked'){streak++;dt.setDate(dt.getDate()-1);}
    else if(d[key]==='missed'){break;}
    else{if(streak===0&&fmtDate(new Date())===key){dt.setDate(dt.getDate()-1);continue;}break;}
  }
  return streak;
}

function bestStreak(){
  const d=state.data;const keys=Object.keys(d).filter(k=>d[k]==='checked').sort();
  if(!keys.length)return 0;let best=1,cur=1;
  for(let i=1;i<keys.length;i++){const prev=new Date(keys[i-1]);const expected=new Date(prev);expected.setDate(expected.getDate()+1);if(fmtDate(expected)===keys[i]){cur++;if(cur>best)best=cur;}else cur=1;}
  return best;
}

function toggle(dateStr){
  const cur=state.data[dateStr];
  if(!cur||cur==='none'){state.data[dateStr]='checked';}
  else if(cur==='checked'){state.data[dateStr]='missed';}
  else{delete state.data[dateStr];}
  save();render();
}

function applyBgGlow(streak){
  const t=Math.min(streak,30)/30;
  // Page background shifts from near-black to dark green
  const r=Math.round(6+t*0);
  const g=Math.round(6+t*30);
  const b=Math.round(12+t*6);
  document.body.style.backgroundColor='rgb('+r+','+g+','+b+')';
  // Ambient glow on top
  const glowA=t*0.15;
  document.getElementById('ambientGlow').style.background='radial-gradient(ellipse at 50% 30%,rgba(0,255,106,'+glowA+') 0%,transparent 70%)';
  // Left and right page glow via box-shadow on body or container
  const sideA=t*0.25;
  document.body.style.boxShadow=sideA>0?'inset 0 0 '+(80+t*200)+'px rgba(0,255,106,'+sideA.toFixed(3)+')':'none';
}

function updateStats(){
  const streak=calcStreak();const best=bestStreak();
  let total=0;Object.values(state.data).forEach(v=>{if(v==='checked')total++;});
  document.getElementById('sBest').textContent=best;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sStreak').textContent=streak;
  applyBgGlow(streak);
}

function render(){
  const weeks=getWeeks();const today=fmtDate(new Date());
  document.getElementById('gridHead').innerHTML='<span></span>'+DAYS.map(function(x){return '<span>'+x+'</span>';}).join('');
  let html='';
  weeks.forEach(wk=>{
    html+='<div class="week-row"><div class="wk-label">'+fmtWeek(wk.start)+'</div>';
    wk.days.forEach(day=>{
      const key=fmtDate(day);const isFuture=key>today;const isToday=key===today;
      const val=state.data[key]||'none';
      let cls='cell';
      if(isFuture)cls+=' future';if(isToday)cls+=' today';
      if(val==='checked')cls+=' checked';
      else if(val==='missed')cls+=' missed';
      const mark=val==='checked'?'\u2713':val==='missed'?'\u2717':'';
      html+='<div class="'+cls+'" onclick="cellClick(this,\''+key+'\')"><span class="mark">'+mark+'</span></div>';
    });
    html+='</div>';
  });
  document.getElementById('scrollArea').innerHTML=html;
  updateStats();
  // Auto-scroll to bottom (current week)
  const sa=document.getElementById('scrollArea');
  sa.scrollTop=sa.scrollHeight;
}

function cellClick(el,dateStr){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');toggle(dateStr);}

render();
</script>
</body>
</html>
