<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HABIT // TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Share Tech Mono',monospace;background:#06060c;color:#d4d4e0;
  min-height:100vh;overflow-x:hidden;position:relative;
  transition:background 1.5s ease;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
  pointer-events:none;z-index:9999;
}
.container{max-width:880px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:48px}
.header h1{
  font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;
  letter-spacing:0.25em;color:#00e5ff;
  text-shadow:0 0 20px rgba(0,229,255,0.4),0 0 60px rgba(0,229,255,0.15);
}
.header .tagline{
  font-size:0.72rem;color:#4a4a6a;letter-spacing:0.6em;text-transform:uppercase;margin-top:6px;
}
.stats-bar{
  display:flex;justify-content:center;gap:48px;margin-top:24px;
  padding:18px 24px;border:1px solid #1a1a30;border-radius:10px;
  background:linear-gradient(135deg,rgba(0,229,255,0.02),rgba(168,85,247,0.02));
}
.stat{text-align:center}
.stat .val{
  font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:700;
  color:#00ff6a;text-shadow:0 0 15px rgba(0,255,106,0.4);
}
.stat .lbl{font-size:0.6rem;color:#4a4a6a;letter-spacing:0.35em;text-transform:uppercase;margin-top:3px}
.habit-name-display{
  text-align:center;margin-bottom:20px;
  font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:0.1em;color:#00e5ff;
}
.grid-wrapper{
  background:#10101e;border:1px solid #1a1a30;border-radius:14px;
  padding:20px;overflow-y:auto;max-height:70vh;position:relative;
}
.grid-wrapper::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#00e5ff,transparent);opacity:0.3;
}
.grid-head{
  display:grid;grid-template-columns:70px repeat(7,1fr);gap:4px;margin-bottom:4px;
  position:sticky;top:0;background:#10101e;z-index:2;padding-bottom:4px;
}
.grid-head span{
  text-align:center;font-size:0.6rem;color:#4a4a6a;letter-spacing:0.25em;
  text-transform:uppercase;padding:5px 0;
}
.week-row{display:grid;grid-template-columns:70px repeat(7,1fr);gap:4px;margin-bottom:4px}
.wk-label{
  font-size:0.58rem;color:#4a4a6a;display:flex;align-items:center;
  padding-left:2px;white-space:nowrap;
}
.cell{
  aspect-ratio:1;max-height:52px;border:1px solid #1a1a30;border-radius:8px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .25s;font-size:1.1rem;user-select:none;position:relative;
}
.cell:hover:not(.future){border-color:rgba(0,229,255,0.4);transform:scale(1.08)}
.cell.checked{color:#00ff6a;text-shadow:0 0 10px rgba(0,255,106,0.5)}
.cell.checked .mark{font-weight:bold}
.cell.missed{
  border-color:rgba(255,0,60,0.4);color:#ff003c;
  text-shadow:0 0 10px rgba(255,0,60,0.5);
  background:rgba(255,0,60,0.04)!important;
}
.cell.future{opacity:0.2;cursor:default;pointer-events:none}
.cell.today{border-color:#00e5ff;box-shadow:0 0 12px rgba(0,229,255,0.2)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.cell.pop{animation:pop .25s ease}
.cell .mark{position:relative;z-index:1;font-size:1.15rem}
.empty-state{
  text-align:center;padding:60px 20px;color:#4a4a6a;
  border:1px dashed #1a1a30;border-radius:14px;
}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;opacity:0.4}
.empty-state p{font-size:0.8rem;letter-spacing:0.1em}
.add-bar{display:flex;gap:10px;margin-bottom:20px}
.add-bar input{
  flex:1;background:#10101e;border:1px solid #1a1a30;color:#d4d4e0;
  padding:13px 18px;font-family:'Share Tech Mono',monospace;font-size:0.85rem;
  border-radius:8px;outline:none;transition:all .3s;
}
.add-bar input:focus{border-color:#00e5ff;box-shadow:0 0 12px rgba(0,229,255,0.15)}
.add-bar input::placeholder{color:#4a4a6a}
.btn{
  background:transparent;border:1px solid #00e5ff;color:#00e5ff;
  padding:13px 28px;font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:500;
  letter-spacing:0.2em;border-radius:8px;cursor:pointer;transition:all .3s;text-transform:uppercase;
}
.btn:hover{background:rgba(0,229,255,0.08);box-shadow:0 0 16px rgba(0,229,255,0.2)}
.del-btn{
  background:none;border:none;color:#4a4a6a;cursor:pointer;font-size:0.8rem;
  padding:4px 8px;border-radius:4px;transition:all .3s;margin-left:12px;
}
.del-btn:hover{color:#ff003c;text-shadow:0 0 10px rgba(255,0,60,0.4)}
@media(max-width:600px){
  .header h1{font-size:1.6rem;letter-spacing:0.15em}
  .stats-bar{gap:20px;padding:14px 16px}
  .stat .val{font-size:1.3rem}
  .grid-head,.week-row{grid-template-columns:50px repeat(7,1fr)}
  .container{padding:24px 12px}
  .cell{max-height:40px;border-radius:6px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>HABIT TRACKER</h1>
    <div class="tagline">discipline equals freedom</div>
    <div class="stats-bar">
      <div class="stat"><div class="val" id="sBest">0</div><div class="lbl">Best Streak</div></div>
      <div class="stat"><div class="val" id="sTotal">0</div><div class="lbl">Total Checks</div></div>
      <div class="stat"><div class="val" id="sCurrent">0</div><div class="lbl">Current Streak</div></div>
    </div>
  </div>
  <div class="add-bar">
    <input type="text" id="nameInp" placeholder="Habit name..." />
    <button class="btn" onclick="setName()">Set</button>
  </div>
  <div class="habit-name-display" id="habitLabel">Exercise</div>
  <div class="grid-wrapper" id="gridWrap">
    <div id="grid"></div>
  </div>
</div>
<script>
var WEEKS = 26;
var STORAGE_KEY = 'htracker_v7';
var DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
var firstRender = true;
var state = loadState();

function loadState(){
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  } catch(e){}
  return {name: 'Exercise', data: {}};
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function fmtDate(d){
  var y = d.getFullYear();
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return y + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
}

function fmtWeek(d){
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return (day < 10 ? '0' : '') + day + '/' + (m < 10 ? '0' : '') + m;
}

function getMonday(d){
  var dt = new Date(d);
  var dow = dt.getDay();
  var diff = dt.getDate() - dow + (dow === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function getWeeks(){
  var today = new Date();
  var mon = getMonday(today);
  var weeks = [];
  for(var i = WEEKS - 1; i >= 0; i--){
    var wk = new Date(mon);
    wk.setDate(wk.getDate() - i * 7);
    var days = [];
    for(var j = 0; j < 7; j++){
      var d = new Date(wk);
      d.setDate(d.getDate() + j);
      days.push(d);
    }
    weeks.push({start: wk, days: days});
  }
  return weeks;
}

function calcStreak(){
  var d = state.data;
  var streak = 0;
  var dt = new Date();
  dt.setHours(0,0,0,0);
  while(true){
    var key = fmtDate(dt);
    if(d[key] === 'checked'){
      streak++;
      dt.setDate(dt.getDate() - 1);
    } else if(d[key] === 'missed'){
      break;
    } else {
      if(streak === 0 && fmtDate(new Date()) === key){
        dt.setDate(dt.getDate() - 1);
        continue;
      }
      break;
    }
  }
  return streak;
}

function bestStreak(){
  var d = state.data;
  var keys = [];
  for(var k in d){ if(d[k] === 'checked') keys.push(k); }
  keys.sort();
  if(keys.length === 0) return 0;
  var best = 1;
  var cur = 1;
  for(var i = 1; i < keys.length; i++){
    var prev = new Date(keys[i-1]);
    var expected = new Date(prev);
    expected.setDate(expected.getDate() + 1);
    if(fmtDate(expected) === keys[i]){
      cur++;
      if(cur > best) best = cur;
    } else {
      cur = 1;
    }
  }
  return best;
}

function applyBgGlow(streak){
  var t = Math.min(streak, 30) / 30;
  var r = Math.round(6 + t * 4);
  var g = Math.round(6 + t * 114);
  var b = Math.round(12 + t * 18);
  document.body.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
}

function toggle(dateStr){
  var cur = state.data[dateStr];
  if(!cur || cur === 'none'){
    state.data[dateStr] = 'checked';
  } else if(cur === 'checked'){
    state.data[dateStr] = 'missed';
  } else {
    delete state.data[dateStr];
  }
  saveState();
  render();
}

function setName(){
  var inp = document.getElementById('nameInp');
  var name = inp.value.trim();
  if(!name) return;
  state.name = name;
  saveState();
  inp.value = '';
  render();
}

function cellClick(el, dateStr){
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  toggle(dateStr);
}

function render(){
  var grid = document.getElementById('grid');
  var weeks = getWeeks();
  var today = fmtDate(new Date());
  var d = state.data;

  document.getElementById('habitLabel').textContent = state.name;

  var html = '';
  html += '<div class="grid-head"><span></span>';
  for(var di = 0; di < DAYS.length; di++){
    html += '<span>' + DAYS[di] + '</span>';
  }
  html += '</div>';

  for(var wi = 0; wi < weeks.length; wi++){
    var wk = weeks[wi];
    html += '<div class="week-row"><div class="wk-label">' + fmtWeek(wk.start) + '</div>';
    for(var dj = 0; dj < wk.days.length; dj++){
      var day = wk.days[dj];
      var key = fmtDate(day);
      var isFuture = key > today;
      var isToday = key === today;
      var val = d[key] || 'none';
      var cls = 'cell';
      if(isFuture) cls += ' future';
      if(isToday) cls += ' today';
      if(val === 'checked') cls += ' checked';
      if(val === 'missed') cls += ' missed';
      var mark = val === 'checked' ? '&#10003;' : val === 'missed' ? '&#10007;' : '';
      html += '<div class="' + cls + '" onclick="cellClick(this,\'' + key + '\')">';
      html += '<span class="mark">' + mark + '</span></div>';
    }
    html += '</div>';
  }

  grid.innerHTML = html;

  var streak = calcStreak();
  var best = bestStreak();
  var total = 0;
  var hasMissed = false;
  for(var k in d){
    if(d[k] === 'checked') total++;
    if(d[k] === 'missed') hasMissed = true;
  }

  document.getElementById('sBest').textContent = best;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sCurrent').textContent = streak;

  applyBgGlow(hasMissed ? 0 : best);

  if(firstRender){
    firstRender = false;
    var wrap = document.getElementById('gridWrap');
    wrap.scrollTop = wrap.scrollHeight;
  }
}

render();
</script>
</body>
</html>
